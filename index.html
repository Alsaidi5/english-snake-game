<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة بالونات الحروف السحرية 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0fdf4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
        }

        h1 {
            color: #db2777;
            font-size: 1.8rem;
            text-shadow: 2px 2px #fbcfe8;
            margin-bottom: 10px;
            text-align: center;
        }

        /* اللوحة التعليمية الكبيرة والثابتة */
        #learning-card {
            background: #ffffff;
            border: 4px solid #f43f5e;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.2);
            width: 100%;
            max-width: 360px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            z-index: 10;
        }

        .main-letter {
            font-size: 3.5rem;
            font-weight: bold;
            color: #1e3a8a;
            display: block;
            margin-bottom: 5px;
        }

        .main-word {
            font-size: 2rem;
            color: #0d9488;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .main-arabic {
            font-size: 1.6rem;
            color: #4b5563;
        }

        /* منطقة طيران البالونات */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 50vh;
            background: rgba(255, 255, 255, 0.4);
            border: 3px dashed #60a5fa;
            border-radius: 20px;
            overflow: hidden;
            z-index: 5;
        }

        /* تصميم البالونة الملونة */
        .balloon {
            position: absolute;
            width: 65px;
            height: 78px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -5px -5px rgba(0,0,0,0.15), 0 5px 10px rgba(0,0,0,0.1);
            animation: floatUp var(--speed) linear forwards;
        }

        /* حبل البالونة الصغير */
        .balloon::after {
            content: "↓";
            position: absolute;
            bottom: -12px;
            color: rgba(0,0,0,0.2);
            font-size: 0.8rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-120px); }
        }

        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px #047857;
            z-index: 10;
        }

        .btn:active {
            box-shadow: 0 2px #047857;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <h1>🎈 فرقع بالونة الحرف الصحيح ✨</h1>
    
    <div id="learning-card">
        <span class="main-letter" id="lbl-letter">A a</span>
        <div class="main-word" id="lbl-word">Apple 🍎</div>
        <div class="main-arabic" id="lbl-arabic">تفاحة</div>
    </div>

    <div id="game-area" id="gameArea"></div>

    <button class="btn" onclick="startGame()">ابدأ التعلم واللعب 🔄</button>

<script>
const gameArea = document.getElementById("game-area");
let wordIndex = 0;
let spawnInterval;
const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#ff6b81', '#20bf6b'];

const alphabetData = [
    { letter: "A a", char: "A", word: "Apple", arabic: "تفاحة", emoji: "🍎" },
    { letter: "B b", char: "B", word: "Banana", arabic: "موزة", emoji: "🍌" },
    { letter: "C c", char: "C", word: "Cat", arabic: "قطة", emoji: "🐱" },
    { letter: "D d", char: "D", word: "Dog", arabic: "كلب", emoji: "🐶" },
    { letter: "E e", char: "E", word: "Egg", arabic: "بيضة", emoji: "🥚" },
    { letter: "F f", char: "F", word: "Fish", arabic: "سمكة", emoji: "🐟" },
    { letter: "G g", char: "G", word: "Grapes", arabic: "عنب", emoji: "🍇" },
    { letter: "H h", char: "H", word: "Horse", arabic: "حصان", emoji: "🐴" },
    { letter: "I i", char: "I", word: "Ice cream", arabic: "مثلجات", emoji: "🍦" },
    { letter: "J j", char: "J", word: "Juice", arabic: "عصير", emoji: "🧃" },
    { letter: "K k", char: "K", word: "Kangaroo", arabic: "كانغرو", emoji: "🦘" },
    { letter: "L l", char: "L", word: "Lion", arabic: "أسد", emoji: "🦁" },
    { letter: "M m", char: "M", word: "Monkey", arabic: "قرد", emoji: "🐒" },
    { letter: "N n", char: "N", word: "Nut", arabic: "مكسرات", emoji: "🥜" },
    { letter: "O o", char: "O", word: "Orange", arabic: "برتقالة", emoji: "🍊" },
    { letter: "P p", char: "P", word: "Parrot", arabic: "ببغاء", emoji: "🦜" },
    { letter: "Q q", char: "Q", word: "Queen", arabic: "ملكة", emoji: "👑" },
    { letter: "R r", char: "R", word: "Rabbit", arabic: "أرنب", emoji: "🐇" },
    { letter: "S s", char: "S", word: "Sun", arabic: "شمس", emoji: "☀️" },
    { letter: "T t", char: "T", word: "Tree", arabic: "شجرة", emoji: "🌳" },
    { letter: "U u", char: "U", word: "Umbrella", arabic: "مظلة", emoji: "☂️" },
    { letter: "V v", char: "V", word: "Van", arabic: "شاحنة صغيرة", emoji: "🚐" },
    { letter: "W w", char: "W", word: "Watermelon", arabic: "بطيخ", emoji: "🍉" },
    { letter: "X x", char: "X", word: "Xylophone", arabic: "إكسيلوفون", emoji: "🎼" },
    { letter: "Y y", char: "Y", word: "Yo-yo", arabic: "يويو", emoji: "🪀" },
    { letter: "Z z", char: "Z", word: "Zebra", arabic: "حمار وحشي", emoji: "🦓" }
];

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.75; 
        window.speechSynthesis.speak(utterance);
    }
}

function updateCard() {
    let current = alphabetData[wordIndex];
    document.getElementById("lbl-letter").innerText = current.letter;
    document.getElementById("lbl-word").innerText = `${current.word} ${current.emoji}`;
    document.getElementById("lbl-arabic").innerText = current.arabic;
}

function createBalloon() {
    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    // تحديد ما إذا كانت البالونة ستحمل الحرف الصحيح أم حرفاً عشوائياً آخر
    let currentTarget = alphabetData[wordIndex];
    let isCorrect = Math.random() > 0.4; // 60% تطلع البالونة الصحيحة لسهولة اللعب
    
    if (isCorrect) {
        balloon.innerText = currentTarget.char;
    } else {
        let randomLetter = alphabetData[Math.floor(Math.random() * alphabetData.length)].char;
        balloon.innerText = randomLetter;
    }

    // إعطاء البالونة لوناً وموقعاً وسرعة عشوائية تناسب شاشة الجوال الصغير
    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    balloon.style.left = Math.random() * (gameArea.clientWidth - 70) + "px";
    balloon.style.setProperty('--speed', (Math.random() * 2 + 3) + "s"); // تطير خلال 3 إلى 5 ثواني

    // حدث اللمس أو الضغط (الفرقعة)
    balloon.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handlePop(balloon, balloon.innerText);
    });
    balloon.addEventListener("mousedown", () => handlePop(balloon, balloon.innerText));

    gameArea.appendChild(balloon);

    // حذف البالونة تلقائياً بعد خروجها من الشاشة لتخفيف الضغط عن الجوال
    balloon.addEventListener('animationend', () => {
        balloon.remove();
    });
}

function handlePop(balloon, letterText) {
    let currentTarget = alphabetData[wordIndex];
    
    if (letterText === currentTarget.char) {
        // نطق الحرف والكلمة فوراً عند الاختيار الصحيح
        speak(`${currentTarget.char}... ${currentTarget.word}`);
        
        // تأثير بصري سريع للفرقعة قبل الحذف
        balloon.style.transform = "scale(1.4)";
        balloon.style.opacity = "0";
        setTimeout(() => balloon.remove(), 100);

        // مسح البالونات الحالية والانتقال للحرف التالي
        gameArea.innerHTML = "";
        wordIndex = (wordIndex + 1) % alphabetData.length;
        updateCard();
    } else {
        // إذا أخطأ الطفل: تهتز البالونة فقط ولا يفرقعها للتنبيه بلطف
        balloon.style.transform = "translateX(10px)";
        setTimeout(() => balloon.style.transform = "none", 100);
    }
}

function startGame() {
    wordIndex = 0;
    gameArea.innerHTML = "";
    updateCard();
    clearInterval(spawnInterval);
    // تظهر بالونة جديدة كل ثانية ونصف
    spawnInterval = setInterval(createBalloon, 1400);
    speak("Let's learn English! Find the letter " + alphabetData[wordIndex].char);
}

// تجهيز اللوحة فور فتح الصفحة
updateCard();
</script>

</body>
</html>
