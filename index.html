<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة بالونات الحروف السحرية 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0fdf4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* ترتيب رأسي متتابع لتجنب التمدد الخاطئ */
            height: 100vh;
            padding: 5px 10px; /* تقليل الحواف الميتة */
            overflow: hidden;
        }

        h1 {
            color: #db2777;
            font-size: 1.2rem;
            text-shadow: 1px 1px #fbcfe8;
            text-align: center;
            margin-top: 2px;
            margin-bottom: 4px;
        }

        /* اللوحة التعليمية الكبيرة والثابتة */
        #learning-card {
            background: #ffffff;
            border: 4px solid #f43f5e;
            border-radius: 18px;
            box-shadow: 0 6px 15px rgba(244, 63, 94, 0.15);
            width: 100%;
            max-width: 330px;
            padding: 8px 12px;
            text-align: center;
            margin-bottom: 6px;
            transition: all 0.3s ease;
        }

        .correct-flash {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            transform: scale(1.03);
        }

        .main-letter {
            font-size: 2.6rem;
            font-weight: bold;
            color: #1e3a8a;
            display: block;
            line-height: 1;
        }

        .main-word {
            font-size: 1.6rem;
            color: #0d9488;
            font-weight: bold;
            margin: 2px 0;
        }

        .main-arabic {
            font-size: 1.2rem;
            color: #4b5563;
        }

        #timer-badge {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 3px;
            display: inline-block;
        }

        /* منطقة طيران البالونات - تم ضبط ارتفاعها بدقة لرفع الزر السفلي */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 330px;
            height: 38vh; /* تم إنقاص الارتفاع بشكل مدروس ليظهر الزر تحتها تماماً */
            background: rgba(255, 255, 255, 0.5);
            border: 3px dashed #60a5fa;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        /* تصميم البالونة الملونة */
        .balloon {
            position: absolute;
            width: 52px;
            height: 62px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -4px -4px rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.1);
            animation: floatUp var(--speed) linear forwards;
        }

        .balloon::after {
            content: "↓";
            position: absolute;
            bottom: -9px;
            color: rgba(0,0,0,0.15);
            font-size: 0.65rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(45vh); }
            100% { transform: translateY(-80px); }
        }

        /* قطع الاحتفال الصغيرة المتطايرة */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff0;
            border-radius: 50%;
            animation: confettiFall 1.5s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) translateX(var(--x-move)) rotate(360deg); opacity: 0; }
        }

        /* زر البدء - أصبح مرتفعاً وآمناً من شريط الجوال */
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px #047857;
            margin-bottom: 15px; /* مسافة أمان سفلية */
        }

        .btn:active {
            box-shadow: 0 2px #047857;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <h1>🎈 فرقع بالونة الحرف الصحيح ✨</h1>
    
    <!-- الكرت التعليمي الكبير والثابت أمام الطفل -->
    <div id="learning-card">
        <span class="main-letter" id="lbl-letter">A a</span>
        <div class="main-word" id="lbl-word">Apple 🍎</div>
        <div class="main-arabic" id="lbl-arabic">تفاحة</div>
        <div id="timer-badge" style="display: none;">كرر مع الصوت 🗣️: <span id="countdown">10</span></div>
    </div>

    <!-- منطقة اللعب والطيران للبالونات -->
    <div id="game-area"></div>

    <!-- الزر الأخضر المرتفع والواضح تماماً -->
    <button class="btn" id="start-btn" onclick="startGame()">ابدأ التعلم واللعب 🔄</button>

<script>
const gameArea = document.getElementById("game-area");
const learningCard = document.getElementById("learning-card");
const timerBadge = document.getElementById("timer-badge");
const countdownSpan = document.getElementById("countdown");

let wordIndex = 0;
let spawnInterval;
let isPaused = false;
const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#ff6b81', '#20bf6b'];

const alphabetData = [
    { letter: "A a", char: "A", word: "Apple", arabic: "تفاحة", emoji: "🍎" },
    { letter: "B b", char: "B", word: "Banana", arabic: "موزة", emoji: "🍌" },
    { letter: "C c", char: "C", word: "Cat", arabic: "قطة", emoji: "🐱" },
    { letter: "D d", char: "D", word: "Dog", arabic: "كلب", emoji: "🐶" },
    { letter: "E e", char: "E", word: "Egg", arabic: "بيضة", emoji: "🥚" },
    { letter: "F f", char: "F", word: "Fish", arabic: "سمكة", emoji: "🐟" },
    { letter: "G g", char: "G", word: "Grapes", arabic: "عنب", emoji: "🍇" },
    { letter: "H h", char: "H", word: "Horse", arabic: "حصان", emoji: "🐴" },
    { letter: "I i", char: "I", word: "Ice cream", arabic: "مثلجات", emoji: "🍦" },
    { letter: "J j", char: "J", word: "Juice", arabic: "عصير", emoji: "🧃" },
    { letter: "K k", char: "K", word: "Kangaroo", arabic: "كانغرو", emoji: "🦘" },
    { letter: "L l", char: "L", word: "Lion", arabic: "أسد", emoji: "🦁" },
    { letter: "M m", char: "M", word: "Monkey", arabic: "قرد", emoji: "🐒" },
    { letter: "N n", char: "N", word: "Nut", arabic: "مكسرات", emoji: "🥜" },
    { letter: "O o", char: "O", word: "Orange", arabic: "برتقالة", emoji: "🍊" },
    { letter: "P p", char: "P", word: "Parrot", arabic: "ببغاء", emoji: "🦜" },
    { letter: "Q q", char: "Q", word: "Queen", arabic: "ملكة", emoji: "👑" },
    { letter: "R r", char: "R", word: "Rabbit", arabic: "أرنب", emoji: "🐇" },
    { letter: "S s", char: "S", word: "Sun", arabic: "شمس", emoji: "☀️" },
    { letter: "T t", char: "T", word: "Tree", arabic: "شجرة", emoji: "🌳" },
    { letter: "U u", char: "U", word: "Umbrella", arabic: "مظلة", emoji: "☂️" },
    { letter: "V v", char: "V", word: "Van", arabic: "شاحنة صغيرة", emoji: "🚐" },
    { letter: "W w", char: "W", word: "Watermelon", arabic: "بطيخ", emoji: "🍉" },
    { letter: "X x", char: "X", word: "Xylophone", arabic: "إكسيلوفون", emoji: "🎼" },
    { letter: "Y y", char: "Y", word: "Yo-yo", arabic: "يويو", emoji: "🪀" },
    { letter: "Z z", char: "Z", word: "Zebra", arabic: "حمار وحشي", emoji: "🦓" }
];

function speak(text, rate = 0.75) {
    if ('speechSynthesis' in window) {
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = rate; 
        window.speechSynthesis.speak(utterance);
    }
}

// دالة الترديد الذكي: 3 مرات عادية ثم 3 مرات متباطلة
function repeatWordChain(wordText) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // تصفية أي صوت سابق
        
        // المرات الـ 3 الأولى: سرعة عادية طبيعية (0.8)
        for (let i = 0; i < 3; i++) {
            speak(wordText, 0.8);
        }
        // المرات الـ 3 الأخيرة: سرعة بطيئة جداً ومريحة للطفل (0.45)
        for (let i = 0; i < 3; i++) {
            speak(wordText, 0.45);
        }
    }
}

function updateCard() {
    let current = alphabetData[wordIndex];
    document.getElementById("lbl-letter").innerText = current.letter;
    document.getElementById("lbl-word").innerText = `${current.word} ${current.emoji}`;
    document.getElementById("lbl-arabic").innerText = current.arabic;
}

// تأثير انفجار الفرقعات الملونة الاحتفالية
function createConfettiExplosion() {
    for (let i = 0; i < 40; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * gameArea.clientWidth + "px";
        confetti.style.top = Math.random() * (gameArea.clientHeight / 2) + "px";
        confetti.style.setProperty('--x-move', (Math.random() * 100 - 50) + "px");
        gameArea.appendChild(confetti);
        setTimeout(() => confetti.remove(), 1500);
    }
}

function createBalloon() {
    if (isPaused) return;

    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    let currentTarget = alphabetData[wordIndex];
    let isCorrect = Math.random() > 0.4; 
    
    if (isCorrect) {
        balloon.innerText = currentTarget.char;
    } else {
        let randomLetter = alphabetData[Math.floor(Math.random() * alphabetData.length)].char;
        balloon.innerText = randomLetter;
    }

    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    balloon.style.left = Math.random() * (gameArea.clientWidth - 55) + "px";
    balloon.style.setProperty('--speed', (Math.random() * 1.5 + 3) + "s"); 

    const triggerPop = (e) => {
        e.preventDefault();
        handlePop(balloon, balloon.innerText);
    };
    balloon.addEventListener("touchstart", triggerPop);
    balloon.addEventListener("mousedown", triggerPop);

    gameArea.appendChild(balloon);

    balloon.addEventListener('animationend', () => {
        balloon.remove();
    });
}

function handlePop(balloon, letterText) {
    if (isPaused) return;
    
    let currentTarget = alphabetData[wordIndex];
    
    if (letterText === currentTarget.char) {
        isPaused = true;
        
        // تشغيل نظام الترديد الصوتي المبتكر (6 مرات)
        repeatWordChain(currentTarget.word);
        
        // فرقعة البالونة الحالية
        balloon.style.transform = "scale(1.4)";
        balloon.style.opacity = "0";
        setTimeout(() => balloon.remove(), 100);
        
        // تنظيف ساحة اللعب وإطلاق الفرقعات الاحتفالية الملونة
        gameArea.innerHTML = "";
        createConfettiExplosion();
        
        // تشغيل تأثير الفلاش للوحة وتفعيل العداد
        learningCard.classList.add("correct-flash");
        timerBadge.style.display = "inline-block";
        
        let timeLeft = 10;
        countdownSpan.innerText = timeLeft;
        
        let countdownInterval = setInterval(() => {
            timeLeft--;
            countdownSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                
                learningCard.classList.remove("correct-flash");
                timerBadge.style.display = "none";
                isPaused = false;
                
                wordIndex = (wordIndex + 1) % alphabetData.length;
                updateCard();
                speak("Find the letter " + alphabetData[wordIndex].char, 0.75);
            }
        }, 1000);

    } else {
        balloon.style.transform = "translateX(6px)";
        setTimeout(() => balloon.style.transform = "none", 100);
    }
}

function startGame() {
    isPaused = false;
    wordIndex = 0;
    gameArea.innerHTML = "";
    learningCard.classList.remove("correct-flash");
    timerBadge.style.display = "none";
    updateCard();
    clearInterval(spawnInterval);
    spawnInterval = setInterval(createBalloon, 1200);
    speak("Let's learn English! Find the letter " + alphabetData[wordIndex].char, 0.75);
}

updateCard();
</script>

</body>
</html>
