<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة بالونات الحروف السحرية 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0fdf4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* توزيع العناصر لملء الشاشة بشكل متناسق */
            height: 100vh;
            padding: 10px;
            overflow: hidden;
        }

        h1 {
            color: #db2777;
            font-size: 1.4rem;
            text-shadow: 1px 1px #fbcfe8;
            text-align: center;
            margin-top: 5px;
        }

        /* اللوحة التعليمية الكبيرة والثابتة */
        #learning-card {
            background: #ffffff;
            border: 4px solid #f43f5e;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.15);
            width: 100%;
            max-width: 340px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* فلاش أخضر عند الإجابة الصحيحة */
        .correct-flash {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            transform: scale(1.05);
        }

        .main-letter {
            font-size: 3rem;
            font-weight: bold;
            color: #1e3a8a;
            display: block;
            line-height: 1.1;
        }

        .main-word {
            font-size: 1.8rem;
            color: #0d9488;
            font-weight: bold;
            margin: 4px 0;
        }

        .main-arabic {
            font-size: 1.4rem;
            color: #4b5563;
        }

        /* عداد التوقف مخصص للأهل والطفل */
        #timer-badge {
            display: none;
            background: #10b981;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 5px;
            display: inline-block;
        }

        /* منطقة طيران البالونات - تم تصغير الارتفاع لتناسب الجوال */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 340px;
            height: 42vh; /* تناسب شاشات الجوال تماماً مع بقية العناصر */
            background: rgba(255, 255, 255, 0.5);
            border: 3px dashed #60a5fa;
            border-radius: 20px;
            overflow: hidden;
        }

        /* تصميم البالونة الملونة */
        .balloon {
            position: absolute;
            width: 55px;
            height: 66px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -4px -4px rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.1);
            animation: floatUp var(--speed) linear forwards;
        }

        .balloon::after {
            content: "↓";
            position: absolute;
            bottom: -10px;
            color: rgba(0,0,0,0.15);
            font-size: 0.7rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(50vh); }
            100% { transform: translateY(-90px); }
        }

        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 4px #047857;
        }

        .btn:active {
            box-shadow: 0 2px #047857;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <h1>🎈 فرقع بالونة الحرف الصحيح ✨</h1>
    
    <div id="learning-card">
        <span class="main-letter" id="lbl-letter">A a</span>
        <div class="main-word" id="lbl-word">Apple 🍎</div>
        <div class="main-arabic" id="lbl-arabic">تفاحة</div>
        <div id="timer-badge" style="display: none;">ممتاز! القادم بعد: <span id="countdown">10</span></div>
    </div>

    <div id="game-area"></div>

    <button class="btn" id="start-btn" onclick="startGame()">ابدأ التعلم واللعب 🔄</button>

<script>
const gameArea = document.getElementById("game-area");
const learningCard = document.getElementById("learning-card");
const timerBadge = document.getElementById("timer-badge");
const countdownSpan = document.getElementById("countdown");

let wordIndex = 0;
let spawnInterval;
let isPaused = false; // لإيقاف اللعبة مؤقتاً لمدة 10 ثوانٍ عند الإجابة الصحيحة
const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#ff6b81', '#20bf6b'];

const alphabetData = [
    { letter: "A a", char: "A", word: "Apple", arabic: "تفاحة", emoji: "🍎" },
    { letter: "B b", char: "B", word: "Banana", arabic: "موزة", emoji: "🍌" },
    { letter: "C c", char: "C", word: "Cat", arabic: "قطة", emoji: "🐱" },
    { letter: "D d", char: "D", word: "Dog", arabic: "كلب", emoji: "🐶" },
    { letter: "E e", char: "E", word: "Egg", arabic: "بيضة", emoji: "🥚" },
    { letter: "F f", char: "F", word: "Fish", arabic: "سمكة", emoji: "🐟" },
    { letter: "G g", char: "G", word: "Grapes", arabic: "عنب", emoji: "🍇" },
    { letter: "H h", char: "H", word: "Horse", arabic: "حصان", emoji: "🐴" },
    { letter: "I i", char: "I", word: "Ice cream", arabic: "مثلجات", emoji: "🍦" },
    { letter: "J j", char: "J", word: "Juice", arabic: "عصير", emoji: "🧃" },
    { letter: "K k", char: "K", word: "Kangaroo", arabic: "كانغرو", emoji: "🦘" },
    { letter: "L l", char: "L", word: "Lion", arabic: "أسد", emoji: "🦁" },
    { letter: "M m", char: "M", word: "Monkey", arabic: "قرد", emoji: "🐒" },
    { letter: "N n", char: "N", word: "Nut", arabic: "مكسرات", emoji: "🥜" },
    { letter: "O o", char: "O", word: "Orange", arabic: "برتقالة", emoji: "🍊" },
    { letter: "P p", char: "P", word: "Parrot", arabic: "ببغاء", emoji: "🦜" },
    { letter: "Q q", char: "Q", word: "Queen", arabic: "ملكة", emoji: "👑" },
    { letter: "R r", char: "R", word: "Rabbit", arabic: "أرنب", emoji: "🐇" },
    { letter: "S s", char: "S", word: "Sun", arabic: "شمس", emoji: "☀️" },
    { letter: "T t", char: "T", word: "Tree", arabic: "شجرة", emoji: "🌳" },
    { letter: "U u", char: "U", word: "Umbrella", arabic: "مظلة", emoji: "☂️" },
    { letter: "V v", char: "V", word: "Van", arabic: "شاحنة صغيرة", emoji: "🚐" },
    { letter: "W w", char: "W", word: "Watermelon", arabic: "بطيخ", emoji: "🍉" },
    { letter: "X x", char: "X", word: "Xylophone", arabic: "إكسيلوفون", emoji: "🎼" },
    { letter: "Y y", char: "Y", word: "Yo-yo", arabic: "يويو", emoji: "🪀" },
    { letter: "Z z", char: "Z", word: "Zebra", arabic: "حمار وحشي", emoji: "🦓" }
];

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.7; 
        window.speechSynthesis.speak(utterance);
    }
}

function updateCard() {
    let current = alphabetData[wordIndex];
    document.getElementById("lbl-letter").innerText = current.letter;
    document.getElementById("lbl-word").innerText = `${current.word} ${current.emoji}`;
    document.getElementById("lbl-arabic").innerText = current.arabic;
}

function createBalloon() {
    if (isPaused) return; // منع خروج بالونات جديدة في فترة الانتظار والتركيز

    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    let currentTarget = alphabetData[wordIndex];
    let isCorrect = Math.random() > 0.4; 
    
    if (isCorrect) {
        balloon.innerText = currentTarget.char;
    } else {
        let randomLetter = alphabetData[Math.floor(Math.random() * alphabetData.length)].char;
        balloon.innerText = randomLetter;
    }

    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    balloon.style.left = Math.random() * (gameArea.clientWidth - 60) + "px";
    balloon.style.setProperty('--speed', (Math.random() * 2 + 3.5) + "s"); 

    // معالجة اللمس للعمل الفوري على الشاشات الذكية
    const triggerPop = (e) => {
        e.preventDefault();
        handlePop(balloon, balloon.innerText);
    };
    balloon.addEventListener("touchstart", triggerPop);
    balloon.addEventListener("mousedown", triggerPop);

    gameArea.appendChild(balloon);

    balloon.addEventListener('animationend', () => {
        balloon.remove();
    });
}

function handlePop(balloon, letterText) {
    if (isPaused) return; // تعطيل اللمس المتكرر أثناء مهلة الـ 10 ثوانٍ
    
    let currentTarget = alphabetData[wordIndex];
    
    if (letterText === currentTarget.char) {
        isPaused = true; // تفعيل وضع التوقف التعليمي
        
        // نطق تعليمي مميز
        speak(`${currentTarget.char}... ${currentTarget.word}`);
        
        // تأثير بصري فوري على الكرت والبالونة المفرقعة
        balloon.style.transform = "scale(1.5)";
        balloon.style.opacity = "0";
        setTimeout(() => balloon.remove(), 150);
        
        // تنظيف الشاشة بالكامل من باقي البالونات الطائرة لعدم التشتيت
        gameArea.innerHTML = "";
        
        // إضافة فلاش أخضر على لوحة المعلومات للتأكيد
        learningCard.classList.add("correct-flash");
        timerBadge.style.display = "inline-block";
        
        // بدء العداد التنازلي لمدة 10 ثوانٍ
        let timeLeft = 10;
        countdownSpan.innerText = timeLeft;
        
        let countdownInterval = setInterval(() => {
            timeLeft--;
            countdownSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                
                // إعادة اللعبة للوضع الطبيعي والانتقال للحرف القادم
                learningCard.classList.remove("correct-flash");
                timerBadge.style.display = "none";
                isPaused = false;
                
                wordIndex = (wordIndex + 1) % alphabetData.length;
                updateCard();
                speak("Find the letter " + alphabetData[wordIndex].char);
            }
        }, 1000);

    } else {
        // بالونة خاطئة: تهتز بهدوء
        balloon.style.transform = "translateX(8px)";
        setTimeout(() => balloon.style.transform = "none", 100);
    }
}

function startGame() {
    isPaused = false;
    wordIndex = 0;
    gameArea.innerHTML = "";
    learningCard.classList.remove("correct-flash");
    timerBadge.style.display = "none";
    updateCard();
    clearInterval(spawnInterval);
    spawnInterval = setInterval(createBalloon, 1300);
    speak("Let's learn English! Find the letter " + alphabetData[wordIndex].char);
}

updateCard();
</script>

</body>
</html>
