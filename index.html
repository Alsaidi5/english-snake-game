<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة بالونات الحروف السحرية والاختبار 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0fdf4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            padding: 5px 10px;
            overflow: hidden;
        }

        h1 {
            color: #db2777;
            font-size: 1.2rem;
            text-shadow: 1px 1px #fbcfe8;
            text-align: center;
            margin-top: 2px;
            margin-bottom: 4px;
        }

        /* اللوحة التعليمية الكبيرة والثابتة */
        #learning-card {
            background: #ffffff;
            border: 4px solid #f43f5e;
            border-radius: 18px;
            box-shadow: 0 6px 15px rgba(244, 63, 94, 0.15);
            width: 100%;
            max-width: 330px;
            padding: 8px 12px;
            text-align: center;
            margin-bottom: 6px;
            transition: all 0.3s ease;
        }

        .correct-flash {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            transform: scale(1.03);
        }

        .main-letter {
            font-size: 2.6rem;
            font-weight: bold;
            color: #1e3a8a;
            display: block;
            line-height: 1;
        }

        .main-word {
            font-size: 1.6rem;
            color: #0d9488;
            font-weight: bold;
            margin: 2px 0;
        }

        .main-arabic {
            font-size: 1.2rem;
            color: #4b5563;
        }

        #timer-badge {
            background: #10b981;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 3px;
            display: inline-block;
        }

        /* منطقة طيران البالونات والاختبار */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 330px;
            height: 42vh;
            background: rgba(255, 255, 255, 0.5);
            border: 3px dashed #60a5fa;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        /* تصميم البالونة الملونة */
        .balloon {
            position: absolute;
            width: 58px;
            height: 68px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem; /* تصغير الخط قليلاً لتتسع الكلمات العربية والإنجليزية داخل البالونة */
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -4px -4px rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.1);
            animation: floatUp var(--speed) linear forwards;
            text-align: center;
            padding: 2px;
        }

        .balloon::after {
            content: "↓";
            position: absolute;
            bottom: -9px;
            color: rgba(0,0,0,0.15);
            font-size: 0.65rem;
        }

        @keyframes floatUp {
            0% { transform: translateY(48vh); }
            100% { transform: translateY(-80px); }
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff0;
            border-radius: 50%;
            animation: confettiFall 1.5s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) translateX(var(--x-move)) rotate(360deg); opacity: 0; }
        }

        /* حاوية الأزرار أسفل الشاشة */
        #btn-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 330px;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn {
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 85%;
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .btn-green {
            background-color: #10b981;
            box-shadow: 0 4px #047857;
        }
        .btn-blue {
            background-color: #3b82f6;
            box-shadow: 0 4px #1d4ed8;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1 id="game-title">🎈 فرقع بالونة الحرف الصحيح ✨</h1>
    
    <div id="learning-card">
        <span class="main-letter" id="lbl-letter">A a</span>
        <div class="main-word" id="lbl-word">Apple 🍎</div>
        <div class="main-arabic" id="lbl-arabic">تفاحة</div>
        <div id="timer-badge" style="display: none;">كرر مع الصوت 🗣️: <span id="countdown">10</span></div>
    </div>

    <div id="game-area"></div>

    <div id="btn-container">
        <button class="btn btn-green" id="start-btn" onclick="startGame()">ابدأ التعلم واللعب 🔄</button>
        <button class="btn btn-blue" id="quiz-btn" style="display: none;" onclick="startQuiz()">اختبر معلوماتك 🧠✨</button>
    </div>

<script>
const gameArea = document.getElementById("game-area");
const learningCard = document.getElementById("learning-card");
const timerBadge = document.getElementById("timer-badge");
const countdownSpan = document.getElementById("countdown");
const startBtn = document.getElementById("start-btn");
const quizBtn = document.getElementById("quiz-btn");
const gameTitle = document.getElementById("game-title");

let wordIndex = 0;
let spawnInterval;
let isPaused = false;
let isQuizMode = false; // لتحديد إذا كنا في طور اللعبة أو الاختبار العشوائي
let quizScore = 0;
let quizRound = 0;
let currentQuizItem = null;

const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6', '#ff6b81', '#20bf6b'];

const alphabetData = [
    { letter: "A a", char: "A", word: "Apple", arabic: "تفاحة", emoji: "🍎" },
    { letter: "B b", char: "B", word: "Banana", arabic: "موزة", emoji: "🍌" },
    { letter: "C c", char: "C", word: "Cat", arabic: "قطة", emoji: "🐱" },
    { letter: "D d", char: "D", word: "Dog", arabic: "كلب", emoji: "🐶" },
    { letter: "E e", char: "E", word: "Egg", arabic: "بيضة", emoji: "🥚" },
    { letter: "F f", char: "F", word: "Fish", arabic: "سمكة", emoji: "🐟" },
    { letter: "G g", char: "G", word: "Grapes", arabic: "عنب", emoji: "🍇" },
    { letter: "H h", char: "H", word: "Horse", arabic: "حصان", emoji: "🐴" },
    { letter: "I i", char: "I", word: "Ice cream", arabic: "مثلجات", emoji: "🍦" },
    { letter: "J j", char: "J", word: "Juice", arabic: "عصير", emoji: "🧃" },
    { letter: "K k", char: "K", word: "Kangaroo", arabic: "كانغرو", emoji: "🦘" },
    { letter: "L l", char: "L", word: "Lion", arabic: "أسد", emoji: "🦁" },
    { letter: "M m", char: "M", word: "Monkey", arabic: "قرد", emoji: "🐒" },
    { letter: "N n", char: "N", word: "Nut", arabic: "مكسرات", emoji: "🥜" },
    { letter: "O o", char: "O", word: "Orange", arabic: "برتقالة", emoji: "🍊" },
    { letter: "P p", char: "P", word: "Parrot", arabic: "ببغاء", emoji: "🦜" },
    { letter: "Q q", char: "Q", word: "Queen", arabic: "ملكة", emoji: "👑" },
    { letter: "R r", char: "R", word: "Rabbit", arabic: "أرنب", emoji: "🐇" },
    { letter: "S s", char: "S", word: "Sun", arabic: "شمس", emoji: "☀️" },
    { letter: "T t", char: "T", word: "Tree", arabic: "شجرة", emoji: "🌳" },
    { letter: "U u", char: "U", word: "Umbrella", arabic: "مظلة", emoji: "☂️" },
    { letter: "V v", char: "V", word: "Van", arabic: "شاحنة صغيرة", emoji: "🚐" },
    { letter: "W w", char: "W", word: "Watermelon", arabic: "بطيخ", emoji: "🍉" },
    { letter: "X x", char: "X", word: "Xylophone", arabic: "إكسيلوفون", emoji: "🎼" },
    { letter: "Y y", char: "Y", word: "Yo-yo", arabic: "يويو", emoji: "🪀" },
    { letter: "Z z", char: "Z", word: "Zebra", arabic: "حمار وحشي", emoji: "🦓" }
];

function speakWithPromise(text, rate) {
    return new Promise((resolve) => {
        if ('speechSynthesis' in window) {
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = rate;
            utterance.onend = () => { setTimeout(resolve, 400); };
            window.speechSynthesis.speak(utterance);
        } else {
            resolve();
        }
    });
}

async function repeatWordChainWithPauses(wordText) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        for (let i = 0; i < 3; i++) {
            if (!isPaused) break;
            await speakWithPromise(wordText, 0.85);
        }
        for (let i = 0; i < 3; i++) {
            if (!isPaused) break;
            await speakWithPromise(wordText, 0.5);
        }
    }
}

function updateCard() {
    let current = alphabetData[wordIndex];
    document.getElementById("lbl-letter").innerText = current.letter;
    document.getElementById("lbl-word").innerText = `${current.word} ${current.emoji}`;
    document.getElementById("lbl-arabic").innerText = current.arabic;
}

function createConfettiExplosion() {
    for (let i = 0; i < 40; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * gameArea.clientWidth + "px";
        confetti.style.top = Math.random() * (gameArea.clientHeight / 2) + "px";
        confetti.style.setProperty('--x-move', (Math.random() * 100 - 50) + "px");
        gameArea.appendChild(confetti);
        setTimeout(() => confetti.remove(), 1500);
    }
}

function createBalloon() {
    if (isPaused) return;

    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    let currentTarget = alphabetData[wordIndex];
    
    if (isQuizMode) {
        // بالونات طور الاختبار (تحمل الكلمات العربية)
        let isCorrect = Math.random() > 0.5;
        if (isCorrect) {
            balloon.innerText = currentQuizItem.arabic;
        } else {
            let randomItem = alphabetData[Math.floor(Math.random() * alphabetData.length)];
            while(randomItem.arabic === currentQuizItem.arabic) {
                randomItem = alphabetData[Math.floor(Math.random() * alphabetData.length)];
            }
            balloon.innerText = randomItem.arabic;
        }
    } else {
        // بالونات الطور العادي (تحمل الأحرف الإنجليزية الكبيرة)
        let isCorrect = Math.random() > 0.4; 
        if (isCorrect) {
            balloon.innerText = currentTarget.char;
        } else {
            balloon.innerText = alphabetData[Math.floor(Math.random() * alphabetData.length)].char;
        }
    }

    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    balloon.style.left = Math.random() * (gameArea.clientWidth - 60) + "px";
    balloon.style.setProperty('--speed', (Math.random() * 1.5 + 3.2) + "s"); 

    const triggerPop = (e) => {
        e.preventDefault();
        handlePop(balloon, balloon.innerText);
    };
    balloon.addEventListener("touchstart", triggerPop);
    balloon.addEventListener("mousedown", triggerPop);

    gameArea.appendChild(balloon);

    balloon.addEventListener('animationend', () => {
        balloon.remove();
    });
}

function handlePop(balloon, textContent) {
    if (isPaused) return;
    
    if (isQuizMode) {
        // التحقق في طور الاختبار (مقارنة بالكلمة العربية)
        if (textContent === currentQuizItem.arabic) {
            quizScore++;
            nextQuizQuestion();
        } else {
            balloon.style.transform = "translateX(6px)";
            setTimeout(() => balloon.style.transform = "none", 100);
        }
    } else {
        // التحقق في الطور العادي التعليمي
        let currentTarget = alphabetData[wordIndex];
        if (textContent === currentTarget.char) {
            isPaused = true;
            
            balloon.style.transform = "scale(1.4)";
            balloon.style.opacity = "0";
            setTimeout(() => balloon.remove(), 100);
            
            gameArea.innerHTML = "";
            createConfettiExplosion();
            
            learningCard.classList.add("correct-flash");
            timerBadge.style.display = "inline-block";
            
            repeatWordChainWithPauses(currentTarget.word);
            
            let timeLeft = 10;
            countdownSpan.innerText = timeLeft;
            
            let countdownInterval = setInterval(() => {
                timeLeft--;
                countdownSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    
                    learningCard.classList.remove("correct-flash");
                    timerBadge.style.display = "none";
                    isPaused = false;
                    
                    if (wordIndex < alphabetData.length - 1) {
                        wordIndex++;
                        updateCard();
                        speakWithPromise("Find the letter " + alphabetData[wordIndex].char, 0.75);
                    } else {
                        // نهاية اللعبة بنجاح وظهور الخيارات كاملة
                        gameArea.innerHTML = "<div style='text-align:center; font-size:1.3rem; padding-top:40px; color:#10b981; font-weight:bold;'>🎉 ممتاز يا بطل! أنهيت كل الحروف! 🎉</div>";
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                            let endUtterance = new SpeechSynthesisUtterance("Great job! You finished all the letters!");
                            endUtterance.lang = 'en-US';
                            window.speechSynthesis.speak(endUtterance);
                        }
                        startBtn.style.display = "inline-block";
                        startBtn.innerText = "العب من جديد 🔄";
                        quizBtn.style.display = "inline-block"; // إظهار زر الاختبار المطور هنا
                    }
                }
            }, 1000);
        } else {
            balloon.style.transform = "translateX(6px)";
            setTimeout(() => balloon.style.transform = "none", 100);
        }
    }
}

function startGame() {
    isQuizMode = false;
    isPaused = false;
    wordIndex = 0;
    gameTitle.innerText = "🎈 فرقع بالونة الحرف الصحيح ✨";
    gameArea.innerHTML = "";
    learningCard.classList.remove("correct-flash");
    timerBadge.style.display = "none";
    startBtn.style.display = "none";
    quizBtn.style.display = "none";
    updateCard();
    clearInterval(spawnInterval);
    spawnInterval = setInterval(createBalloon, 1200);
    speakWithPromise("Let's learn English! Find the letter " + alphabetData[wordIndex].char, 0.75);
}

/* طور الاختبار المطور */
function startQuiz() {
    isQuizMode = true;
    quizScore = 0;
    quizRound = 0;
    gameTitle.innerText = "🧠 اختبر معلوماتك: فرقع الترجمة الصحيحة! ✨";
    startBtn.style.display = "none";
    quizBtn.style.display = "none";
    clearInterval(spawnInterval);
    nextQuizQuestion();
    spawnInterval = setInterval(createBalloon, 1100); // طيران بالونات الكلمات أسرع قليلاً للتحدي
}

function nextQuizQuestion() {
    gameArea.innerHTML = "";
    createConfettiExplosion(); // فرقعات ترحيبية بين الأسئلة لزيادة المتعة
    
    if (quizRound < 5) { // الاختبار مكون من 5 جولات عشوائية ممتعة للأطفال
        quizRound++;
        // اختيار كلمة عشوائية من القائمة للاختبار عليها
        currentQuizItem = alphabetData[Math.floor(Math.random() * alphabetData.length)];
        
        // تعديل لوحة العرض لتناسب الاختبار (إخفاء الحرف والعربي لإجبار الطفل على التفكير)
        document.getElementById("lbl-letter").innerText = "🤔 ما معنى؟";
        document.getElementById("lbl-word").innerText = `${currentQuizItem.word} ${currentQuizItem.emoji}`;
        document.getElementById("lbl-arabic").innerText = "؟؟؟";
        
        speakWithPromise("Where is " + currentQuizItem.word, 0.8);
    } else {
        // نهاية الاختبار بنجاح وعرض النتيجة
        clearInterval(spawnInterval);
        gameArea.innerHTML = `
            <div style='text-align:center; font-size:1.4rem; padding-top:30px; color:#3b82f6; font-weight:bold;'>
                👑 كفو يا ذكي! 👑<br>
                درجتك في الاختبار هي:<br>
                <span style="font-size:2.5rem; color:#db2777;">${quizScore} / 5</span>
            </div>`;
            
        document.getElementById("lbl-letter").innerText = "🎉 رائع جداً";
        document.getElementById("lbl-word").innerText = "انتهى الاختبار ✨";
        document.getElementById("lbl-arabic").innerText = "ممتاز ومبدع";
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let scoreUtterance = new SpeechSynthesisUtterance("Fantastic job! You are so smart!");
            scoreUtterance.lang = 'en-US';
            window.speechSynthesis.speak(scoreUtterance);
        }
        
        // إعادة إظهار الأزرار مرة أخرى
        startBtn.style.display = "inline-block";
        startBtn.innerText = "العب من جديد 🔄";
        quizBtn.style.display = "inline-block";
        quizBtn.innerText = "أعد الاختبار 🧠✨";
    }
}

updateCard();
</script>

</body>
</html>
